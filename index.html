<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>邁克兄弟科技股份有限公司 | Apple Style</title>
    <style>
        /* Apple 官網風格基礎設定 */
        :root {
            --bg-color: #ffffff;
            --secondary-bg: #f5f5f7;
            --text-main: #1d1d1f;
            --text-secondary: #86868b;
            --accent-blue: #0066cc;
            --nav-bg: rgba(251, 251, 253, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "SF Pro TC", "SF Pro Display", "PingFang TC", "Helvetica Neue", Helvetica, Arial, sans-serif; }
        
        body { background-color: var(--bg-color); color: var(--text-main); line-height: 1.47; letter-spacing: -0.022em; }

        /* 【頁首導覽列】 */
        header { 
            background: var(--nav-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 9999;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }
        
        .nav-container {
            max-width: 1024px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 80px;
            padding: 0 20px;
        }

        .logo img { 
            height: 100px; 
            width: auto; 
            display: block;
        }

        nav ul { list-style: none; display: flex; gap: 30px; }
        nav ul li a { 
            font-size: 16px; 
            color: var(--text-main); 
            text-decoration: none; 
            opacity: 0.8;
            transition: opacity 0.3s;
        }
        nav ul li a:hover { opacity: 1; color: var(--accent-blue); }

        /* 【Hero 區塊：打造 Apple 的單一區塊感】 */
        .hero { 
            padding: 100px 20px 0 20px; /* 底部設為 0，由圖片自帶留白 */
            background-color: var(--secondary-bg);
            text-align: center;
            margin-bottom: 20px; /* 創造塊與塊之間的間距 */
        }

        .hero-title { 
            font-size: 56px; /* 放大標題，更具視覺衝擊 */
            font-weight: 600;
            letter-spacing: -0.005em;
            margin-bottom: 15px;
            color: var(--text-main);
        }

        .hero-desc {
            font-size: 28px;
            margin-bottom: 30px;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
            color: var(--text-main);
            font-weight: 400;
        }

        /* 【按鈕調整：圓角白底樣式】 */
        .shop-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 80px; /* 在按鈕與照片之間留出大量空白 */
        }

        .hero-btn {
            font-size: 17px;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 980px; /* 保持圓角設定 */
            transition: all 0.3s ease;
            font-weight: 400;
            border: 1px solid var(--accent-blue);
        }
        
        .btn-white { 
            background-color: #ffffff; /* 依要求改為白底 */
            color: var(--accent-blue); 
        }
        .btn-white:hover { 
            background-color: var(--accent-blue); 
            color: #ffffff; 
        }

        /* 英雄照片設定 */
        .hero-image {
            margin-top: 50px; /* 確保照片上方有足夠留白 */
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }
        .hero-image img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 【產品區塊：格狀排列】 */
        .container { max-width: 1024px; margin: 0 auto 80px auto; padding: 0 20px; }
        
        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 20px; 
        }
        
        .product-card { 
            background: var(--secondary-bg); 
            padding: 60px 40px 0 40px; /* 增加頂部內距，讓標題下方照片更靠下 */
            text-align: center; 
            border-radius: 28px; /* 更加圓潤的塊狀邊角 */
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.25, 1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .product-card:hover { transform: scale(1.01); }
        
        .product-card h3 { font-size: 32px; margin-bottom: 10px; font-weight: 600; }
        .product-card p { color: var(--text-secondary); font-size: 19px; margin-bottom: 30px; }
        
        /* 產品照片留白與對齊 */
        .product-card img { 
            height: 300px; 
            width: auto; 
            object-fit: contain; 
            margin-top: 40px; /* 確保照片上方留白 */
        }

        /* 【頁尾】 */
        footer { 
            background: var(--bg-color); 
            color: var(--text-secondary); 
            padding: 60px 20px; 
            font-size: 12px;
            border-top: 1px solid #d2d2d7;
        }
        
        .footer-content { max-width: 1024px; margin: 0 auto; }

        @media (max-width: 768px) {
            .hero-title { font-size: 40px; }
            .hero-desc { font-size: 20px; }
            .product-grid { grid-template-columns: 1fr; }
            .nav-container { height: 60px; }
            .logo img { height: 60px; }
        }
    </style>
</head>

</body>
</html>
